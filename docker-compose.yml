services:
  frontend:
    build:
      context: ./traccar-fleet-system/frontend
      dockerfile: Dockerfile
      args:
        VITE_FLEET_COMMAND_SHEET: "1"
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
      traccar:
        condition: service_healthy

  backend:
    build:
      context: ./fuel-api
      dockerfile: Dockerfile
    env_file:
      # Compose does NOT automatically read backend/.env.
      # This keeps secrets/config stable across rebuilds.
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://numztrak:${POSTGRES_PASSWORD:-NumzFuel2025}@db:5432/numztrak_fuel
      TRACCAR_MYSQL_HOST: traccar-mysql
      TRACCAR_MYSQL_PORT: 3306
      TRACCAR_MYSQL_DATABASE: traccar
      TRACCAR_MYSQL_USER: traccar
      # TRACCAR_MYSQL_PASSWORD comes from ./backend/.env (env_file).
      TRACCAR_SERVER_URL: http://traccar:8082
      TRACCAR_API_URL: http://traccar:8082
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CORS_ORIGIN: https://numz.site,http://localhost:3002
      # Auth: allow x-user-id header fallback when cookie Path is /traccar
      AUTH_STRATEGY: ${AUTH_STRATEGY:-hybrid}
      TRACCAR_ENABLED: ${TRACCAR_ENABLED:-true}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      HYBRID_FALLBACK: ${HYBRID_FALLBACK:-false}
      # TRACKING_NOTIFICATION_BRIDGE / TRACKING_BRIDGE_* — set in ./backend/.env (env_file)
      INVOICE_UPLOAD_DIR: /app/data/invoice-attachments
      VEHICLE_UPLOAD_DIR: /app/data/vehicle-attachments
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      traccar-mysql:
        condition: service_healthy
      traccar:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    volumes:
      - invoice_attachments:/app/data/invoice-attachments
      - vehicle_attachments:/app/data/vehicle-attachments

  db:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: numztrak_fuel
      POSTGRES_USER: numztrak
    ports:
      # Host port only; fuel-api still uses db:5432 inside the compose network.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numztrak -d numztrak_fuel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Traccar upstream DB (fuel-api reads this MySQL schema; Traccar server uses it too)
  traccar-mysql:
    image: mysql:8.0
    env_file:
      - ./backend/.env
    volumes:
      - traccar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  traccar:
    image: traccar/traccar:latest
    depends_on:
      traccar-mysql:
        condition: service_healthy
    environment:
      TRACCAR_DATABASE_URL: jdbc:mysql://traccar-mysql:3306/traccar?useSSL=false&allowPublicKeyRetrieval=true
      TRACCAR_DATABASE_USER: traccar
      # database.password comes from mounted traccar.xml
    volumes:
      # Force Traccar to use MySQL (not built-in H2).
      - ./backend/conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    ports:
      - "8082:8082"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v wget >/dev/null 2>&1; then wget -qO- http://localhost:8082/ >/dev/null; elif command -v nc >/dev/null 2>&1; then nc -z localhost 8082; else exit 1; fi",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
    name: numzfleet_postgres_data
  traccar_mysql_data:
    name: numzfleet_traccar_mysql_data
  invoice_attachments:
    name: numzfleet_invoice_attachments
  vehicle_attachments:
    name: numzfleet_vehicle_attachments
