services:
  frontend:
    build:
      context: ./traccar-fleet-system/frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
      traccar:
        condition: service_healthy

  backend:
    build:
      context: ./fuel-api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://numztrak:${POSTGRES_PASSWORD:-NumzFuel2025}@db:5432/numztrak_fuel
      TRACCAR_MYSQL_HOST: traccar-mysql
      TRACCAR_MYSQL_PORT: 3306
      TRACCAR_MYSQL_DATABASE: traccar
      TRACCAR_MYSQL_USER: traccar
      TRACCAR_MYSQL_PASSWORD: ${MYSQL_PASSWORD:-traccar123}
      TRACCAR_SERVER_URL: http://traccar:8082
      TRACCAR_API_URL: http://traccar:8082
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:3002
      ERB_API_BASE_URL: ${ERB_API_BASE_URL:-http://erb-api:8000}
      ERB_API_TOKEN: ${ERB_API_TOKEN:-change-me-erb-token}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      traccar-mysql:
        condition: service_healthy
      traccar:
        condition: service_healthy
      erb-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  erb-worker:
    build:
      context: ./erb-fuel-monitor
      dockerfile: Dockerfile
    command: ['python', 'erb_scraper_final.py', '--mode', 'schedule']
    environment:
      EMAIL_ENABLED: ${ERB_EMAIL_ENABLED:-false}
      EMAIL_FROM: ${ERB_EMAIL_FROM:-}
      EMAIL_PASSWORD: ${ERB_EMAIL_PASSWORD:-}
      EMAIL_TO: ${ERB_EMAIL_TO:-}
      SMTP_SERVER: ${ERB_SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${ERB_SMTP_PORT:-587}
      SSL_VERIFY: ${ERB_SSL_VERIFY:-true}
      SSL_ALLOW_INSECURE_FALLBACK: ${ERB_SSL_ALLOW_INSECURE_FALLBACK:-true}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    volumes:
      - erb_data:/app/data

  erb-api:
    build:
      context: ./erb-fuel-monitor
      dockerfile: Dockerfile
    command: ['python', '-m', 'uvicorn', 'api_server:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      PORT: 8000
      API_TOKEN: ${ERB_API_TOKEN:-change-me-erb-token}
      API_ALLOWED_ORIGINS: ${ERB_API_ALLOWED_ORIGINS:-http://localhost:3002}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    depends_on:
      - erb-worker
    volumes:
      - erb_data:/app/data
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health\")']
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: numztrak_fuel
      POSTGRES_USER: numztrak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NumzFuel2025}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numztrak -d numztrak_fuel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Traccar upstream DB (fuel-api reads this MySQL schema; Traccar server uses it too)
  traccar-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: traccar
      MYSQL_USER: traccar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-traccar123}
    volumes:
      - traccar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  traccar:
    image: traccar/traccar:latest
    depends_on:
      traccar-mysql:
        condition: service_healthy
    environment:
      TRACCAR_DATABASE_URL: jdbc:mysql://traccar-mysql:3306/traccar?useSSL=false&allowPublicKeyRetrieval=true
      TRACCAR_DATABASE_USER: traccar
      TRACCAR_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-traccar123}
    ports:
      - "8082:8082"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if command -v wget >/dev/null 2>&1; then wget -qO- http://localhost:8082/ >/dev/null; elif command -v nc >/dev/null 2>&1; then nc -z localhost 8082; else exit 1; fi",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  traccar_mysql_data:
  erb_data:
