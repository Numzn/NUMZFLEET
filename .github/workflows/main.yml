name: Production deploy

# Only path to OCI: push to main builds images, pushes Docker Hub, deploys production.

on:
  push:
    branches: [main]
    paths:
      - "traccar-fleet-system/frontend/**"
      - "fuel-api/**"
      - "erb-fuel-monitor/**"
      - "deployment/**"
      - ".github/workflows/main.yml"
  workflow_dispatch:
    inputs:
      git_sha:
        description: "Optional SHA to deploy (break-glass). Defaults to current ref."
        required: false
        type: string

permissions:
  contents: read

env:
  OCI_REPO_PATH: /home/ubuntu/NUMZFLEET

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.target.outputs.sha }}
    steps:
      - name: Resolve target SHA
        id: target
        run: |
          SHA_INPUT="${{ github.event.inputs.git_sha }}"
          if [ -n "$SHA_INPUT" ]; then
            echo "sha=$SHA_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fuel-api/package-lock.json

      - name: Install and test fuel-api
        working-directory: fuel-api
        run: |
          npm ci
          npm test

      - name: Validate MIGRATION_ORDER matches migration files
        run: |
          set -euo pipefail
          # shellcheck source=deployment/utils/fuel-migrations-lib.sh
          source deployment/utils/fuel-migrations-lib.sh
          load_migration_files_from_order
          echo "OK: ${#MIGRATION_FILES[@]} migrations in MIGRATION_ORDER"

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: traccar-fleet-system/frontend/package-lock.json

      - name: Install and build frontend
        working-directory: traccar-fleet-system/frontend
        run: |
          npm ci
          npm run build

  build-and-push:
    needs: quality-checks
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ needs.quality-checks.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.quality-checks.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: traccar-fleet-system/frontend
          file: traccar-fleet-system/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/numzfleet-frontend:${{ needs.quality-checks.outputs.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'https://numz.site' }}
            VITE_TRACCAR_PREFIX=/traccar
            VITE_FLEET_COMMAND_SHEET=1
            BUILD_REF=${{ github.run_id }}-${{ github.run_attempt }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: fuel-api
          file: fuel-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/numzfleet-backend:${{ needs.quality-checks.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ERB
        uses: docker/build-push-action@v6
        with:
          context: erb-fuel-monitor
          file: erb-fuel-monitor/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/numzfleet-erb:${{ needs.quality-checks.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-oci:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.build-and-push.outputs.sha }}

      - name: Verify image manifests exist
        run: |
          chmod +x deployment/verify/verify-docker-manifests.sh
          deployment/verify/verify-docker-manifests.sh "${{ needs.build-and-push.outputs.sha }}" "${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/id_oci
          chmod 600 ~/.ssh/id_oci
          ssh-keyscan -H "${{ secrets.OCI_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to OCI
        env:
          DEPLOY_SHA: ${{ needs.build-and-push.outputs.sha }}
        run: |
          ssh -i ~/.ssh/id_oci "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
            "set -euo pipefail; \
             cd '${OCI_REPO_PATH}'; \
             git fetch origin --tags; \
             git checkout '${DEPLOY_SHA}'; \
             bash deployment/deploy/promote-to-production.sh '${DEPLOY_SHA}' deployment/.env"

      - name: Verify production health
        run: |
          curl -fsS --max-time 30 "https://numz.site/health"
          curl -fsS --max-time 30 "https://numz.site/api/health"
