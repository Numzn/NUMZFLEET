name: Develop checks

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  fuel-api-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fuel-api/package-lock.json

      - name: Install and test fuel-api
        working-directory: fuel-api
        run: |
          npm ci
          npm test

  frontend-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: traccar-fleet-system/frontend/package-lock.json

      - name: Install and typecheck/build frontend
        working-directory: traccar-fleet-system/frontend
        run: |
          npm ci
          npm run build
