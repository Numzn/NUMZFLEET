name: Runner smoke (NumzLab)

on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: [self-hosted, numzlab]
    steps:
      - name: Show host identity
        run: |
          echo "runner=$(hostname)"
          whoami
          pwd

      - name: Verify Docker access
        run: docker ps --format 'table {{.Names}}\t{{.Status}}'

      - name: Verify expected staging repo path
        run: |
          test -d /srv/projects/numzfleet
          ls -la /srv/projects/numzfleet | sed -n '1,40p'
