name: Promote SHA to OCI production

on:
  workflow_dispatch:
    inputs:
      promoted_sha:
        description: "Staging-validated full 40-char SHA to promote"
        required: true
        type: string

permissions:
  contents: write
  deployments: read

env:
  OCI_REPO_PATH: /home/ubuntu/NUMZFLEET

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate promoted SHA format
        run: |
          SHA="${{ github.event.inputs.promoted_sha }}"
          [[ "$SHA" =~ ^[0-9a-fA-F]{40}$ ]]
          git cat-file -e "${SHA}^{commit}"

      - name: Verify staging promotion gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x deployment/verify/verify-docker-manifests.sh deployment/verify/verify-staging-promotion.sh
          deployment/verify/verify-staging-promotion.sh "${{ github.event.inputs.promoted_sha }}" "numz14"

  deploy-oci:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/id_oci
          chmod 600 ~/.ssh/id_oci
          ssh-keyscan -H "${{ secrets.OCI_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Promote SHA on OCI (pull only)
        env:
          PROMOTED_SHA: ${{ github.event.inputs.promoted_sha }}
        run: |
          ssh -i ~/.ssh/id_oci "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
            "set -euo pipefail; \
             cd '${OCI_REPO_PATH}'; \
             git fetch origin --tags; \
             git checkout '${PROMOTED_SHA}'; \
             SKIP_PROMOTION_GATE=1 bash deployment/deploy/promote-to-production.sh '${PROMOTED_SHA}' deployment/.env; \
             bash deployment/backup/baseline-backup.sh '${PROMOTED_SHA}'"

      - name: Verify production health
        run: |
          curl -fsS --max-time 30 "https://numz.site/health"
          curl -fsS --max-time 30 "https://numz.site/api/health"

  update-main:
    needs: deploy-oci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout all history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main to promoted SHA
        env:
          RELEASE_TOKEN: ${{ secrets.NUMZFLEET_RELEASE_BOT_TOKEN }}
        run: |
          test -n "$RELEASE_TOKEN"
          SHA="${{ github.event.inputs.promoted_sha }}"
          git fetch origin main
          git checkout -B main origin/main
          git merge --ff-only "$SHA"
          git push "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
