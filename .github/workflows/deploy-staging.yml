name: Deploy NumzLab staging

on:
  workflow_run:
    workflows: ["Build and push NumzFleet images"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      promoted_sha:
        description: "Manual SHA to deploy to staging"
        required: true
        type: string

permissions:
  contents: read
  deployments: write

env:
  STAGING_REPO_PATH: /srv/projects/numzfleet

jobs:
  deploy-staging:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, numzlab]
    env:
      TARGET_SHA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.promoted_sha || github.event.workflow_run.head_sha }}
    steps:
      - name: Validate SHA format
        run: |
          echo "TARGET_SHA=${TARGET_SHA}"
          [[ "${TARGET_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]

      - name: Sync staging repo checkout
        run: |
          set -euo pipefail
          test -d "${STAGING_REPO_PATH}"
          cd "${STAGING_REPO_PATH}"
          git fetch origin develop --tags
          git checkout "${TARGET_SHA}"

      - name: Verify image manifests exist
        working-directory: /srv/projects/numzfleet
        run: |
          chmod +x deployment/verify/verify-docker-manifests.sh
          deployment/verify/verify-docker-manifests.sh "${TARGET_SHA}" "numz14"

      - name: Deploy staging (with migrations when needed)
        working-directory: /srv/projects/numzfleet
        run: |
          set -euo pipefail
          chmod +x deployment/deploy/deploy-to-staging.sh deployment/run-migrate-and-deploy-staging.sh
          if git diff-tree --no-commit-id --name-only -r "${TARGET_SHA}" | grep -q '^fuel-api/migrations/'; then
            ./deployment/run-migrate-and-deploy-staging.sh "${TARGET_SHA}" deployment/.env.staging
          else
            ./deployment/deploy/deploy-to-staging.sh "${TARGET_SHA}" deployment/.env.staging
            chmod +x deployment/verify/staging-smoke.sh
            ./deployment/verify/staging-smoke.sh
          fi

      - name: Record staging deployment
        working-directory: /srv/projects/numzfleet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          chmod +x deployment/deploy/record-staging-deployment.sh
          deployment/deploy/record-staging-deployment.sh "${TARGET_SHA}" "${RUN_URL}"

      - name: Write promotion candidate artifact
        run: |
          mkdir -p promoted-candidates
          cat > "promoted-candidates/${TARGET_SHA}.json" <<EOF
          {
            "sha": "${TARGET_SHA}",
            "environment": "staging",
            "workflow": "deploy-staging",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload promotion candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: promoted-candidate-${{ env.TARGET_SHA }}
          path: promoted-candidates/${{ env.TARGET_SHA }}.json
