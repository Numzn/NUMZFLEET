# ==============================
# NUMZFLEET - CLEAN NGINX CONFIG (LOCAL DEV - HTTP ONLY)
# ==============================

upstream fuel_api {
    server numztrak-fuel-api:3001;
}

upstream traccar_server {
    server numztrak-traccar:8082;
}

# ------------------------------
# MAIN SERVER (HTTP for dev)
# ------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 10.152.184.242 10.109.140.242 127.0.0.1 129.151.163.95 localhost _;

    # --------------------------
    # Health check
    # --------------------------
    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # --------------------------
    # Fuel API (specific routes)
    # --------------------------
    location /api/fuel-requests {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    # fuel-api report routes only (Traccar owns /api/reports/stops, /route, POST /api/reports, …)
    location /api/reports/trips {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }
    location /api/reports/summary {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }
    location /api/reports/fuel-summary {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }
    location /api/reports/erb/latest {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    location /api/vehicles {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    location /api/vehicle-specs {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    location /api/public/ {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    location /api/operation-sessions {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    # --------------------------
    # /api/* catch-all -> fuel_api (cemented). Traccar only under /traccar/.
    # --------------------------
    location /api/ {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 60s;
    }

    # --------------------------
    # Socket.IO (Fuel API)
    # --------------------------
    location /socket.io/ {
        proxy_pass http://fuel_api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400;
    }

    # --------------------------
    # Traccar (moved out of /api)
    # --------------------------
    location /traccar/ {
        proxy_pass http://traccar_server/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 60s;
    }

    # --------------------------
    # Static assets cache
    # --------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------
    # React SPA fallback (serve production build)
    # --------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for HTML files
    location ~ \.html$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

