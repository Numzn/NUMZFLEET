# OCI Production Nginx Config
# Minimal routing for API-only backend services
# Frontend is deployed separately (not via Docker)

upstream fuel_api {
    server fuel-api:3001;
}

upstream traccar_server {
    server traccar-server:8082;
}

upstream erb_api {
    server erb-api:5000;
}

server {
    listen 80;
    listen [::]:80;
    server_name 129.151.163.95 localhost _;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Fuel API routes
    location ~ ^/api/(health|fuel-requests|vehicle-specs|vehicles|reports|public)(/|$) {
        proxy_pass http://fuel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Socket.IO for real-time updates
    location /socket.io/ {
        proxy_pass http://fuel_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ERB API routes
    location /api/erb/ {
        proxy_pass http://erb_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Other /api/* routes go to Traccar
    location /api/ {
        proxy_pass http://traccar_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Default - not a frontend server
    location / {
        return 404;
    }
}
