services:
  # ===========================================
  # DATABASE LAYER
  # ===========================================

  traccar-mysql:
    image: mysql:8.0
    container_name: numztrak-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: traccar
      MYSQL_USER: traccar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /opt/numztrak/mysql:/var/lib/mysql
      - ./mysql/conf.d/numztrak-low-memory.cnf:/etc/mysql/conf.d/numztrak-low-memory.cnf:ro
    networks:
      - numztrak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  fuel-postgres:
    image: postgres:15-alpine
    container_name: numztrak-postgres
    environment:
      POSTGRES_DB: numztrak_fuel
      POSTGRES_USER: numztrak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/numztrak/postgres:/var/lib/postgresql/data
    networks:
      - numztrak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U numztrak -d numztrak_fuel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # CORE SERVICES
  # ===========================================

  traccar-server:
    image: traccar/traccar:latest
    container_name: numztrak-traccar
    depends_on:
      traccar-mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "8443:8443"
      - "5001:5001"
      - "5002:5002"
      - "5003:5003"
      - "5005:5005"
      - "5006:5006"
      - "5009:5009"
      - "5013:5013"
      - "5020:5020"
      - "5055:5055"
    volumes:
      - /opt/numztrak/traccar/logs:/opt/traccar/logs
      - ./conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ./cert.pem:/opt/traccar/conf/cert.pem:ro
      - ./key.pem:/opt/traccar/conf/key.pem:ro
    environment:
      TRACCAR_DATABASE_URL: jdbc:mysql://traccar-mysql:3306/traccar?useSSL=false&allowPublicKeyRetrieval=true
      TRACCAR_DATABASE_USER: traccar
      TRACCAR_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - numztrak-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if command -v wget >/dev/null 2>&1; then wget -qO- http://localhost:8082/ >/dev/null; elif command -v nc >/dev/null 2>&1; then nc -z localhost 8082; else echo 'no http client' >&2; exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 5

  fuel-api:
    build:
      context: ../fuel-api
      dockerfile: Dockerfile
    image: backend-fuel-api:latest
    container_name: numztrak-fuel-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://numztrak:${POSTGRES_PASSWORD}@fuel-postgres:5432/numztrak_fuel
      TRACCAR_MYSQL_HOST: traccar-mysql
      TRACCAR_MYSQL_PORT: 3306
      TRACCAR_MYSQL_DATABASE: traccar
      TRACCAR_MYSQL_USER: traccar
      TRACCAR_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      NODE_ENV: production
      AUTH_STRATEGY: ${AUTH_STRATEGY:-permissive}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}
      TRACCAR_ENABLED: ${TRACCAR_ENABLED:-false}
      LOG_AUTH: ${LOG_AUTH:-false}
      PORT: 3001
      SESSION_SECRET: ${SESSION_SECRET}
      ERB_API_BASE_URL: ${ERB_API_BASE_URL:-http://erb-api:8000}
      ERB_API_TOKEN: ${ERB_API_TOKEN}
      # Allow all production origins (comma-separated)
      CORS_ORIGIN: https://numz.site,https://www.numz.site,https://app.numz.site,https://api.numz.site,https://rad-cactus-ca0409.netlify.app
    depends_on:
      fuel-postgres:
        condition: service_healthy
      traccar-mysql:
        condition: service_healthy
    networks:
      - numztrak-network
    restart: unless-stopped

  erb-worker:
    build:
      context: ../erb-fuel-monitor
      dockerfile: Dockerfile
    container_name: numztrak-erb-worker
    command: ['python', 'erb_scraper_final.py', '--mode', 'schedule']
    environment:
      EMAIL_ENABLED: ${ERB_EMAIL_ENABLED:-true}
      EMAIL_FROM: ${ERB_EMAIL_FROM}
      EMAIL_PASSWORD: ${ERB_EMAIL_PASSWORD}
      EMAIL_TO: ${ERB_EMAIL_TO}
      SMTP_SERVER: ${ERB_SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${ERB_SMTP_PORT:-587}
      SSL_VERIFY: ${ERB_SSL_VERIFY:-true}
      SSL_ALLOW_INSECURE_FALLBACK: ${ERB_SSL_ALLOW_INSECURE_FALLBACK:-true}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    volumes:
      - erb_data:/app/data
    networks:
      - numztrak-network
    restart: unless-stopped

  erb-api:
    build:
      context: ../erb-fuel-monitor
      dockerfile: Dockerfile
    container_name: numztrak-erb-api
    command: ['python', '-m', 'uvicorn', 'api_server:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      PORT: 8000
      API_TOKEN: ${ERB_API_TOKEN}
      API_ALLOWED_ORIGINS: ${ERB_API_ALLOWED_ORIGINS:-https://numz.site}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    depends_on:
      - erb-worker
    volumes:
      - erb_data:/app/data
    networks:
      - numztrak-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/v1/health")']
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # GATEWAY / REVERSE PROXY
  # ===========================================

  numztrak-nginx:
    image: nginx:alpine
    container_name: numztrak-nginx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - /c/Users/NUMERI/NUMZFLEET/traccar-fleet-system/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - traccar-server
      - fuel-api
      - erb-api
    networks:
      - numztrak-network
    restart: unless-stopped

# ===========================================
# NETWORK
# ===========================================

networks:
  numztrak-network:
    driver: bridge

volumes:
  erb_data:
    driver: local