# =========================================================================
# NumzTrak Backend-Only Production Stack (Oracle Cloud / Any Linux Host)
# =========================================================================
# Features:
#   - Traccar GPS/Fleet Tracking Server
#   - Fuel API (Node.js microservice)
#   - PostgreSQL (Fuel API database)
#   - MySQL (Traccar database)
#   - Nginx Reverse Proxy (HTTPS/SSL + frontend static hosting)
#
# Same-origin production topology:
#   - https://numz.site serves frontend and API
#   - /api routes to Traccar
#   - Fuel API and socket paths are proxied by Nginx
#
# Startup: docker-compose -f docker-compose.prod.yml up -d
# =========================================================================

services:
  # =========================================================================
  # DATABASE LAYER
  # =========================================================================

  traccar-mysql:
    image: mysql:8.0
    container_name: numztrak-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: traccar
      MYSQL_USER: traccar
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - traccar_mysql_data:/var/lib/mysql
      - ./mysql/conf.d/numztrak-low-memory.cnf:/etc/mysql/conf.d/numztrak-low-memory.cnf:ro
    networks:
      - numztrak-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 20s
      retries: 10

  fuel-postgres:
    image: postgres:15-alpine
    container_name: numztrak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: numztrak_fuel
      POSTGRES_USER: numztrak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - fuel_postgres_data:/var/lib/postgresql/data
    networks:
      - numztrak-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U numztrak -d numztrak_fuel']
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # CORE BACKEND SERVICES
  # =========================================================================

  traccar-server:
    image: traccar/traccar:latest
    container_name: numztrak-traccar
    restart: unless-stopped
    depends_on:
      traccar-mysql:
        condition: service_healthy
    environment:
      TRACCAR_DATABASE_URL: jdbc:mysql://traccar-mysql:3306/traccar?useSSL=false&allowPublicKeyRetrieval=true
      TRACCAR_DATABASE_USER: traccar
      TRACCAR_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - traccar_logs:/opt/traccar/logs
      - ./conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ./cert.pem:/opt/traccar/conf/cert.pem:ro
      - ./key.pem:/opt/traccar/conf/key.pem:ro
    networks:
      - numztrak-network
    # GPS Protocol ports (exposed for GPS devices to connect directly)
    # Adjust these based on which protocols you use
    ports:
      - '5001:5001'   # Traccar protocol
      - '5002:5002'   # GL200 protocol
      - '5003:5003'   # Xexun protocol
      - '5005:5005'   # TK103 protocol
      - '5006:5006'   # TK103 binary protocol
      - '5009:5009'   # Teltonika protocol
      - '5013:5013'   # Neoway protocol
      - '5020:5020'   # TK103-2 protocol
      - '5055:5055'   # OsmAnd protocol
      # Add more GPS protocols as needed based on traccar.xml config
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8082/api/server']
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 120s

  fuel-api:
    # Built image tag when using `docker compose build`; for fast registry deploy set
    # NUMZ_FUEL_API_IMAGE in backend/.env (e.g. yourdockeruser/numztrak-backend:<git-sha>) and use `up --no-build`.
    image: ${NUMZ_FUEL_API_IMAGE:-numztrak/fuel-api:local}
    build:
      context: ../fuel-api
      dockerfile: Dockerfile
    container_name: numztrak-fuel-api
    restart: unless-stopped
    depends_on:
      fuel-postgres:
        condition: service_healthy
      traccar-mysql:
        condition: service_healthy
    environment:
      # Database connections
      DATABASE_URL: postgresql://numztrak:${POSTGRES_PASSWORD}@fuel-postgres:5432/numztrak_fuel
      TRACCAR_MYSQL_HOST: traccar-mysql
      TRACCAR_MYSQL_PORT: 3306
      TRACCAR_MYSQL_DATABASE: traccar
      TRACCAR_MYSQL_USER: traccar
      TRACCAR_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # App configuration — production must not use AUTH_STRATEGY=permissive (fuel-api will exit).
      NODE_ENV: production
      PORT: 3001
      SESSION_SECRET: ${SESSION_SECRET}
      AUTH_STRATEGY: ${AUTH_STRATEGY:-strict}
      TRACCAR_ENABLED: ${TRACCAR_ENABLED:-true}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      HYBRID_FALLBACK: ${HYBRID_FALLBACK:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://numz.site}
      # Optional: for external Traccar connections
      TRACCAR_SERVER_URL: ${TRACCAR_SERVER_URL:-http://traccar-server:8082}
      # ERB API relay (server-side only)
      ERB_API_BASE_URL: ${ERB_API_BASE_URL:-http://erb-api:8000}
      ERB_API_TOKEN: ${ERB_API_TOKEN:?Set ERB_API_TOKEN in backend/.env or CI secrets}
    networks:
      - numztrak-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  erb-worker:
    build:
      context: ../erb-fuel-monitor
      dockerfile: Dockerfile
    container_name: numztrak-erb-worker
    restart: unless-stopped
    command: ['python', 'erb_scraper_final.py', '--mode', 'schedule']
    environment:
      EMAIL_ENABLED: ${ERB_EMAIL_ENABLED:-true}
      EMAIL_FROM: ${ERB_EMAIL_FROM}
      EMAIL_PASSWORD: ${ERB_EMAIL_PASSWORD}
      EMAIL_TO: ${ERB_EMAIL_TO}
      SMTP_SERVER: ${ERB_SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${ERB_SMTP_PORT:-587}
      SSL_VERIFY: ${ERB_SSL_VERIFY:-true}
      SSL_ALLOW_INSECURE_FALLBACK: ${ERB_SSL_ALLOW_INSECURE_FALLBACK:-true}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    volumes:
      - erb_data:/app/data
    networks:
      - numztrak-network

  erb-api:
    build:
      context: ../erb-fuel-monitor
      dockerfile: Dockerfile
    container_name: numztrak-erb-api
    restart: unless-stopped
    command: ['python', '-m', 'uvicorn', 'api_server:app', '--host', '0.0.0.0', '--port', '8000']
    environment:
      PORT: 8000
      API_TOKEN: ${ERB_API_TOKEN:?Set ERB_API_TOKEN in backend/.env or CI secrets}
      API_ALLOWED_ORIGINS: ${ERB_API_ALLOWED_ORIGINS:-https://numz.site}
      S3_ENABLED: ${ERB_S3_ENABLED:-false}
      S3_BUCKET: ${ERB_S3_BUCKET:-}
      S3_KEY: ${ERB_S3_KEY:-fuel_prices.json}
    depends_on:
      - erb-worker
    volumes:
      - erb_data:/app/data
    networks:
      - numztrak-network
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/v1/health")']
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # REVERSE PROXY / GATEWAY
  # =========================================================================

  numztrak-nginx:
    image: nginx:alpine
    container_name: numztrak-nginx
    restart: unless-stopped
    depends_on:
      - traccar-server
      - fuel-api
      - erb-api
    ports:
      - '80:80'    # HTTP (redirects to HTTPS)
      - '443:443'  # HTTPS (production traffic)
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../traccar-fleet-system/frontend/dist:/usr/share/nginx/html:ro
      # Let's Encrypt SSL certificates (host paths on Oracle Cloud server)
      - /etc/letsencrypt/live/numz.site/fullchain.pem:/etc/ssl/certs/numz.site.crt:ro
      - /etc/letsencrypt/live/numz.site/privkey.pem:/etc/ssl/private/numz.site.key:ro
      - nginx_logs:/var/log/nginx
    networks:
      - numztrak-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', '--no-check-certificate', 'https://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3

# =========================================================================
# VOLUMES (Persistent Data Storage)
# =========================================================================

volumes:
  traccar_mysql_data:
    driver: local
  fuel_postgres_data:
    driver: local
  traccar_logs:
    driver: local
  nginx_logs:
    driver: local
  erb_data:
    driver: local

# =========================================================================
# NETWORKS
# =========================================================================

networks:
  numztrak-network:
    driver: bridge
