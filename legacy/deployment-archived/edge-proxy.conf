# Legacy HTTP-only edge (optional). Production compose uses Caddy on :80 and :443 instead — see deployment/caddy/Caddyfile.
# Public edge: proxy all traffic to the frontend service (nginx inside serves SPA + /api + /traccar).
# Mount as /etc/nginx/conf.d/default.conf in the edge container.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $upstream_frontend frontend;

  location = /edge-health {
    access_log off;
    return 200 'ok\n';
    add_header Content-Type text/plain;
  }

  location / {
    proxy_pass http://$upstream_frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 86400;
  }
}
