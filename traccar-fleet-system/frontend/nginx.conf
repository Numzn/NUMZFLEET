map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS. Using a variable in proxy_pass forces runtime re-resolution
  # so nginx doesn't pin stale container IPs after `docker compose up --force-recreate`.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_upstream backend;

  # Fuel API: Socket.IO (same origin as SPA)
  location /socket.io/ {
    proxy_pass http://$backend_upstream:3000$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Fuel API: REST under /api
  location /api/ {
    proxy_pass http://$backend_upstream:3000$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Traccar UI + API (SPA uses /traccar prefix on localhost)
  location /traccar/ {
    proxy_pass http://traccar:8082/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Traccar session cookie must be shared across /traccar and /api routes.
    # Scope JSESSIONID to root so frontend fuel-api calls under /api also receive it.
    proxy_cookie_path /api/ /;
    proxy_cookie_path /api /;
    proxy_cookie_path /traccar/ /;
    proxy_cookie_path /traccar /;
    proxy_cookie_path / /;
    proxy_buffering off;
  }

  # Service worker + registration — must always revalidate or users stay on old UI forever.
  location = /sw.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location ~* ^/workbox-[a-zA-Z0-9_-]+\.js$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  # Hashed Vite assets — safe to cache forever (filename changes each release).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # SPA shell — must not be cached long-term or browsers keep an old index.html that
  # references removed JS chunks after deploy (blank / broken app until hard refresh).
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  }

  # Frontend: SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
