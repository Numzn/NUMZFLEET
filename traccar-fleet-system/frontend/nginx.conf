map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS. Using a variable in proxy_pass forces runtime re-resolution
  # so nginx doesn't pin stale container IPs after `docker compose up --force-recreate`.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_upstream backend;

  # Fuel API: Socket.IO (same origin as SPA)
  location /socket.io/ {
    proxy_pass http://$backend_upstream:3000$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  # Fuel API: REST under /api
  location /api/ {
    proxy_pass http://$backend_upstream:3000$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Traccar UI + API (SPA uses /traccar prefix on localhost)
  location /traccar/ {
    proxy_pass http://traccar:8082/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path /traccar/ /;
    proxy_cookie_path /traccar /;
    proxy_buffering off;
  }

  # Frontend: SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
